    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --glass: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #e8e8ed;
      --text-secondary: #8b8b9e;
      --accent-blue: #6366f1;
      --accent-pink: #ec4899;
      --accent-green: #22c55e;
      --accent-amber: #f59e0b;
      --accent-cyan: #06b6d4;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
    }

    body {
      font-family:
        "Inter",
        -apple-system,
        sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background orbs */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-orbs .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .bg-orbs .orb:nth-child(1) {
      width: 500px;
      height: 500px;
      background: var(--accent-blue);
      top: -10%;
      left: -10%;
      animation-delay: 0s;
    }

    .bg-orbs .orb:nth-child(2) {
      width: 400px;
      height: 400px;
      background: var(--accent-pink);
      bottom: -10%;
      right: -10%;
      animation-delay: -7s;
    }

    .bg-orbs .orb:nth-child(3) {
      width: 300px;
      height: 300px;
      background: var(--accent-cyan);
      top: 40%;
      left: 50%;
      animation-delay: -14s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(40px, -30px) scale(1.1);
      }

      66% {
        transform: translate(-30px, 20px) scale(0.9);
      }
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease-out both;
    }

    .header .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg,
          #fff 0%,
          var(--accent-blue) 50%,
          var(--accent-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 2rem;
      padding: 4px;
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      animation: fadeUp 0.6s 0.1s ease-out both;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      border-radius: 11px;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active-cowok {
      background: linear-gradient(135deg, var(--accent-blue), #818cf8);
      color: #fff;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
    }

    .tab-btn.active-cewek {
      background: linear-gradient(135deg, var(--accent-pink), #f472b6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(236, 72, 153, 0.35);
    }

    /* Tip box */
    .tip-box {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(12px);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .tip-box .tip-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* Day card */
    .day-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 14px;
      backdrop-filter: blur(12px);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease,
        border-color 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease-out both;
    }

    .day-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .day-number {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .day-number.cowok-bg {
      background: linear-gradient(135deg, var(--accent-blue), #818cf8);
    }

    .day-number.cewek-bg {
      background: linear-gradient(135deg, var(--accent-pink), #f472b6);
    }

    .day-info {
      flex: 1;
      min-width: 0;
    }

    .day-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .day-focus-text {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .day-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-active {
      background: rgba(34, 197, 94, 0.15);
      color: var(--accent-green);
    }

    .badge-rest {
      background: rgba(139, 139, 158, 0.12);
      color: var(--text-secondary);
    }

    /* Section label */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 14px 0 8px;
      padding-left: 2px;
    }

    /* Exercise items */
    .exercise-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .exercise-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: all 0.25s ease;
      cursor: default;
    }

    .exercise-item:hover {
      background: var(--surface-hover);
      border-color: var(--glass-border);
      transform: translateX(4px);
    }

    .exercise-name {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
    }

    .exercise-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .muscle-tag {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .muscle-tag.cowok-tag {
      background: rgba(99, 102, 241, 0.12);
      color: #a5b4fc;
    }

    .muscle-tag.cewek-tag {
      background: rgba(236, 72, 153, 0.12);
      color: #f9a8d4;
    }

    .exercise-set {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    /* Rest box */
    .rest-box {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 14px;
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease-out both;
    }

    .rest-box .rest-icon {
      font-size: 1.5rem;
      margin-bottom: 6px;
    }

    .rest-box .rest-day {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }

    .rest-box .rest-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Tab content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* Progress indicator */
    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--surface);
      border-radius: 4px;
      margin-bottom: 2rem;
      overflow: hidden;
      animation: fadeUp 0.6s 0.15s ease-out both;
    }

    .progress-bar .fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .progress-bar .fill.cowok-fill {
      background: linear-gradient(90deg,
          var(--accent-blue),
          var(--accent-cyan));
    }

    .progress-bar .fill.cewek-fill {
      background: linear-gradient(90deg,
          var(--accent-pink),
          var(--accent-amber));
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.2s ease-out both;
    }

    .stat-card {
      flex: 1;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: 800;
    }

    .stat-value.cowok-text {
      color: #818cf8;
    }

    .stat-value.cewek-text {
      color: #f472b6;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .header h1 {
        font-size: 1.5rem;
      }

      .app {
        padding: 1.25rem 1rem 3rem;
      }

      .day-card {
        padding: 1rem;
      }

      .exercise-name {
        font-size: 0.8rem;
      }
    }
  </style>
</head>

                    muscle: "Core",
                  },
                  {
                    name: "Glute Bridge",
                    set: "3 × 20",
                    muscle: "Glute + Core",
                  },
                ],
              },
            ],
          },
          {
            day: "Sabtu",
            badge: "Istirahat",
            badgeClass: "badge-rest",
            focus: "Recovery",
            rest: true,
          },
          {
            day: "Minggu",
            badge: "Istirahat",
            badgeClass: "badge-rest",
            focus: "Recovery",
            rest: true,
          },
        ],
      },
    };

    const dayMap = {
      Senin: "Sen",
      Selasa: "Sel",
      Rabu: "Rab",
      Kamis: "Kam",
      Jumat: "Jum",
      Sabtu: "Sab",
      Minggu: "Min",
    };
    let currentGender = "cowok";

    function renderStats(gender) {
      const s = data[gender].stats;
      const cls = gender === "cowok" ? "cowok-text" : "cewek-text";
      document.getElementById("stats-container").innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value ${cls}">${s.hari}×</div><div class="stat-label">Per Minggu</div></div>
      <div class="stat-card"><div class="stat-value ${cls}">${s.optional}</div><div class="stat-label">Opsional</div></div>
      <div class="stat-card"><div class="stat-value ${cls}">${s.exercises}</div><div class="stat-label">Gerakan</div></div>
    </div>`;
    }

    function renderTab(gender) {
      const d = data[gender];
      const el = document.getElementById("tab-" + gender);
      const tagClass = gender === "cowok" ? "cowok-tag" : "cewek-tag";
      const numClass = gender === "cowok" ? "cowok-bg" : "cewek-bg";
      let idx = 0;

      let html = `<div class="tip-box"><span class="tip-icon">💡</span><span>${d.tip}</span></div>`;

      d.days.forEach((day, i) => {
        const delay = `animation-delay:${i * 0.06}s`;
        if (day.rest && !day.sections) {
          html += `<div class="rest-box" style="${delay}">
        <div class="rest-icon">😴</div>
        <div class="rest-day">${day.day}</div>
        <div class="rest-desc">Istirahat & recovery — tidur cukup, makan bergizi</div>
      </div>`;
        } else {
          idx++;
          html += `<div class="day-card" style="${delay}">
        <div class="day-header">
          <div class="day-number ${numClass}">${dayMap[day.day]}</div>
          <div class="day-info">
            <div class="day-title">${day.day}</div>
            <div class="day-focus-text">${day.focus}</div>
          </div>
          <span class="day-badge ${day.badgeClass}">${day.badge}</span>
        </div>
        <div class="exercise-list">`;
          day.sections.forEach((sec) => {
            html += `<div class="section-label">${sec.label}</div>`;
            sec.exercises.forEach((ex) => {
              html += `<div class="exercise-item">
            <span class="exercise-name">${ex.name}</span>
            <div class="exercise-meta">
              ${ex.muscle ? `<span class="muscle-tag ${tagClass}">${ex.muscle}</span>` : ""}
              <span class="exercise-set">${ex.set}</span>
            </div>
          </div>`;
            });
          });
          html += `</div></div>`;
        }
      });
      el.innerHTML = html;
    }

    function switchTab(gender) {
      currentGender = gender;
      const btnC = document.getElementById("btn-cowok");
      const btnK = document.getElementById("btn-cewek");
      btnC.className =
        "tab-btn" + (gender === "cowok" ? " active-cowok" : "");
      btnK.className =
        "tab-btn" + (gender === "cewek" ? " active-cewek" : "");

      const fill = document.getElementById("progress-fill");
      fill.className =
        "fill " + (gender === "cowok" ? "cowok-fill" : "cewek-fill");
      fill.style.width = gender === "cowok" ? "43%" : "43%";

      document.getElementById("tab-cowok").className =
        "tab-content" + (gender === "cowok" ? " active" : "");
      document.getElementById("tab-cewek").className =
        "tab-content" + (gender === "cewek" ? " active" : "");
      renderStats(gender);
    }

    renderTab("cowok");
    renderTab("cewek");
    renderStats("cowok");
  </script>
</body>

</html>
